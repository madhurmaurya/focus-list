<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Focus List</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap');

  :root{
    --bg: #0a0f0d;
    --panel: #101613;
    --panel-border: #1e2b26;
    --mint: #4ade9c;
    --mint-dim: #2d6b52;
    --mint-glow: rgba(74,222,156,0.18);
    --text: #e7f3ee;
    --text-dim: #7d9089;
    --text-faint: #4a5c54;
    --amber: #e8b04b;
    --amber-dim: #6b5322;
    --amber-glow: rgba(232,176,75,0.18);
    --red: #e0607a;
    --red-dim: #6b2b39;
    --red-glow: rgba(224,96,122,0.2);
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 15% 0%, rgba(74,222,156,0.06), transparent 45%),
      radial-gradient(circle at 85% 100%, rgba(74,222,156,0.04), transparent 45%);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    padding: 40px 20px 80px;
    min-height: 100vh;
  }

  .wrap{ max-width: 640px; margin: 0 auto; }

  /* ---------- Header ---------- */
  header{ margin-bottom: 26px; }
  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--mint);
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom: 6px;
  }
  .eyebrow .dot{
    width:6px; height:6px; border-radius:50%;
    background: var(--mint);
    box-shadow: 0 0 8px 2px var(--mint-glow);
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse{ 0%,100%{opacity:1} 50%{opacity:.35} }

  h1{
    font-size: 30px;
    font-weight: 800;
    margin: 0 0 6px;
    letter-spacing: -0.02em;
  }
  .sub{ color: var(--text-dim); font-size: 13.5px; }

  /* ---------- Stats ---------- */
  .stats-row{
    display:flex;
    gap: 10px;
    margin: 20px 0 6px;
  }
  .stat{
    flex:1;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 12px;
    padding: 12px 14px;
  }
  .stat-num{
    font-family:'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    line-height: 1.1;
  }
  .stat-label{
    font-family:'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-top: 3px;
  }
  .stat.mint .stat-num{ color: var(--mint); }
  .stat.amber .stat-num{ color: var(--amber); }
  .stat.red .stat-num{ color: var(--red); }

  .rail{
    height: 6px; background: var(--panel-border);
    border-radius: 4px; overflow:hidden; margin: 16px 0 28px;
  }
  .rail-fill{
    height:100%; background: linear-gradient(90deg, var(--mint-dim), var(--mint));
    border-radius:4px; transition: width .5s cubic-bezier(.4,0,.2,1);
  }

  /* ---------- Add task card ---------- */
  .add-card{
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 22px;
    position: relative;
    overflow: hidden;
  }
  .add-card::before{
    content:"";
    position:absolute; top:0; left:0; right:0; height:2px;
    background: linear-gradient(90deg, transparent, var(--mint), transparent);
  }

  .add-input{
    width: 100%;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid var(--panel-border);
    background: rgba(255,255,255,0.02);
    color: var(--text);
    outline: none;
    margin-bottom: 12px;
    transition: border-color .15s ease;
  }
  .add-input::placeholder{ color: var(--text-faint); }
  .add-input:focus{ border-color: var(--mint-dim); }

  .add-row2{
    display:flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }

  .priority-picker{ display:flex; gap: 6px; }
  .priority-chip{
    font-family:'JetBrains Mono', monospace;
    font-size: 11.5px;
    font-weight: 600;
    padding: 8px 13px;
    border-radius: 20px;
    border: 1px solid var(--panel-border);
    background: rgba(255,255,255,0.02);
    color: var(--text-faint);
    cursor: pointer;
    transition: all .15s ease;
  }
  .priority-chip[data-p="low"].active{ color: var(--mint); border-color: var(--mint-dim); background: rgba(74,222,156,0.08); }
  .priority-chip[data-p="medium"].active{ color: var(--amber); border-color: var(--amber-dim); background: rgba(232,176,75,0.08); }
  .priority-chip[data-p="high"].active{ color: var(--red); border-color: var(--red-dim); background: rgba(224,96,122,0.08); }
  .priority-chip:hover{ color: var(--text); }

  .date-input{
    font-family:'JetBrains Mono', monospace;
    font-size: 12.5px;
    padding: 8px 12px;
    border-radius: 20px;
    border: 1px solid var(--panel-border);
    background: rgba(255,255,255,0.02);
    color: var(--text);
    outline: none;
    color-scheme: dark;
  }
  .date-input:focus{ border-color: var(--mint-dim); }

  .add-btn{
    margin-left: auto;
    font-family:'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    padding: 9px 20px;
    border-radius: 20px;
    border: 1px solid var(--mint);
    background: var(--mint);
    color: #06251a;
    cursor: pointer;
    transition: all .15s ease;
  }
  .add-btn:hover{ background: #5ee8ad; }

  /* ---------- Filters ---------- */
  .filter-bar{
    display:flex;
    justify-content: space-between;
    align-items:center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .tabs{
    display:flex;
    gap: 4px;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 20px;
    padding: 3px;
  }
  .tab{
    font-family:'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 7px 14px;
    border-radius: 16px;
    color: var(--text-faint);
    cursor: pointer;
    transition: all .15s ease;
    background: none;
    border: none;
  }
  .tab.active{ background: rgba(74,222,156,0.1); color: var(--mint); }
  .tab:hover:not(.active){ color: var(--text); }

  .sort-select{
    font-family:'JetBrains Mono', monospace;
    font-size: 11.5px;
    padding: 8px 12px;
    border-radius: 20px;
    border: 1px solid var(--panel-border);
    background: var(--panel);
    color: var(--text-dim);
    outline: none;
    cursor: pointer;
  }

  .priority-filters{ display:flex; gap:6px; flex-wrap: wrap; }
  .pf-chip{
    font-family:'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 6px 12px;
    border-radius: 20px;
    border: 1px solid var(--panel-border);
    background: rgba(255,255,255,0.02);
    color: var(--text-faint);
    cursor: pointer;
    transition: all .15s ease;
  }
  .pf-chip.active{ color: var(--text); border-color: var(--mint-dim); background: rgba(74,222,156,0.06); }

  /* ---------- Task list ---------- */
  .list{ display:flex; flex-direction:column; gap: 10px; }

  .task{
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 14px;
    padding: 14px 14px 14px 16px;
    display:flex;
    align-items:flex-start;
    gap: 12px;
    position: relative;
    border-left: 3px solid var(--panel-border);
    transition: border-color .2s ease, opacity .2s ease;
  }
  .task[data-priority="low"]{ border-left-color: var(--mint-dim); }
  .task[data-priority="medium"]{ border-left-color: var(--amber-dim); }
  .task[data-priority="high"]{ border-left-color: var(--red-dim); }
  .task.overdue{ border-left-color: var(--red); background: linear-gradient(90deg, rgba(224,96,122,0.06), transparent 40%); }
  .task.completed{ opacity: 0.5; }

  .box{
    flex:none;
    width:19px; height:19px;
    margin-top: 2px;
    border-radius: 6px;
    border: 1.5px solid var(--text-faint);
    display:flex; align-items:center; justify-content:center;
    cursor: pointer;
    transition: all .15s ease;
  }
  .task.completed .box{ background: var(--mint); border-color: var(--mint); }
  .box svg{ width:12px; height:12px; opacity:0; transform: scale(0.5); transition: all .15s ease; }
  .task.completed .box svg{ opacity:1; transform: scale(1); }

  .task-body{ flex:1; min-width:0; }
  .task-title{
    font-size: 14.5px;
    font-weight: 500;
    line-height: 1.4;
    word-break: break-word;
  }
  .task.completed .task-title{ text-decoration: line-through; color: var(--text-faint); }

  .task-meta{
    display:flex;
    align-items:center;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 7px;
  }
  .badge{
    font-family:'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 3px 9px;
    border-radius: 20px;
    border: 1px solid transparent;
  }
  .badge.low{ color: var(--mint); background: rgba(74,222,156,0.1); border-color: var(--mint-dim); }
  .badge.medium{ color: var(--amber); background: rgba(232,176,75,0.1); border-color: var(--amber-dim); }
  .badge.high{ color: var(--red); background: rgba(224,96,122,0.1); border-color: var(--red-dim); }

  .due-pill{
    font-family:'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    display:flex; align-items:center; gap:5px;
  }
  .due-pill svg{ width:12px; height:12px; opacity:0.7; }
  .due-pill.overdue{ color: var(--red); font-weight: 600; }
  .due-pill.overdue svg{ opacity:1; }

  .overdue-tag{
    font-family:'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--red);
    background: rgba(224,96,122,0.12);
    border: 1px solid var(--red-dim);
    padding: 3px 9px;
    border-radius: 20px;
    animation: overdue-blink 2.2s ease-in-out infinite;
  }
  @keyframes overdue-blink{ 0%,100%{ opacity:1 } 50%{ opacity:.6 } }

  .del-btn{
    flex:none;
    width: 28px; height: 28px;
    border-radius: 8px;
    border: 1px solid transparent;
    background: none;
    color: var(--text-faint);
    cursor: pointer;
    display:flex; align-items:center; justify-content:center;
    opacity: 0;
    transition: all .15s ease;
  }
  .task:hover .del-btn{ opacity: 1; }
  .del-btn:hover{ color: var(--red); border-color: var(--red-dim); background: rgba(224,96,122,0.08); }
  .del-btn svg{ width:15px; height:15px; }

  .empty-state{
    text-align:center;
    padding: 50px 20px;
    color: var(--text-faint);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }
  .empty-state svg{ width:34px; height:34px; margin-bottom:12px; opacity:0.4; }

  footer{
    margin-top: 26px;
    display:flex;
    justify-content: space-between;
    align-items:center;
    font-family:'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-faint);
  }
  .clear-btn{
    background:none; border:1px solid var(--panel-border); color: var(--text-dim);
    font-family:'JetBrains Mono', monospace; font-size:12px;
    padding:7px 14px; border-radius:20px; cursor:pointer;
    transition: all .2s ease;
  }
  .clear-btn:hover{ border-color:#7a3c4a; color: var(--red); }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>Focus List</h1>
    <div class="sub">Track what matters, in priority order. Overdue items surface automatically.</div>
  </header>

  <div class="stats-row">
    <div class="stat mint">
      <div class="stat-num" id="statActive">0</div>
      <div class="stat-label">Active</div>
    </div>
    <div class="stat amber">
      <div class="stat-num" id="statDone">0</div>
      <div class="stat-label">Completed</div>
    </div>
    <div class="stat red">
      <div class="stat-num" id="statOverdue">0</div>
      <div class="stat-label">Overdue</div>
    </div>
  </div>
  <div class="rail"><div class="rail-fill" id="railFill" style="width:0%"></div></div>

  <div class="add-card">
    <input type="text" class="add-input" id="taskInput" placeholder="What needs to get done?" maxlength="200">
    <div class="add-row2">
      <div class="priority-picker" id="priorityPicker">
        <button class="priority-chip" data-p="low">Low</button>
        <button class="priority-chip active" data-p="medium">Medium</button>
        <button class="priority-chip" data-p="high">High</button>
      </div>
      <input type="date" class="date-input" id="dueInput">
      <button class="add-btn" id="addBtn">Add Task</button>
    </div>
  </div>

  <div class="filter-bar">
    <div class="tabs" id="statusTabs">
      <button class="tab active" data-tab="all">All</button>
      <button class="tab" data-tab="active">Active</button>
      <button class="tab" data-tab="completed">Done</button>
    </div>
    <select class="sort-select" id="sortSelect">
      <option value="priority">Sort: Priority</option>
      <option value="due">Sort: Due date</option>
      <option value="created">Sort: Newest</option>
    </select>
  </div>
  <div class="priority-filters" id="priorityFilters" style="margin-bottom:16px;">
    <button class="pf-chip active" data-pf="all">All priorities</button>
    <button class="pf-chip" data-pf="low">Low</button>
    <button class="pf-chip" data-pf="medium">Medium</button>
    <button class="pf-chip" data-pf="high">High</button>
  </div>

  <div class="list" id="list"></div>

  <footer>
    <span id="statusText">syncing…</span>
    <button class="clear-btn" id="clearBtn">Clear completed</button>
  </footer>

</div>

<script>
const STORAGE_KEY = 'faocus-tasks-state';
const hasClaudeStorage = (typeof window.storage !== 'undefined') && window.storage && typeof window.storage.get === 'function';

async function storageGet(key){
  if(hasClaudeStorage){
    try{ return await window.storage.get(key, false); }
    catch(e){ return null; }
  }
  try{
    const raw = localStorage.getItem(key);
    return raw ? { value: raw } : null;
  }catch(e){ return null; }
}

async function storageSet(key, value){
  if(hasClaudeStorage){
    try{ return await window.storage.set(key, value, false); }
    catch(e){ return null; }
  }
  try{
    localStorage.setItem(key, value);
    return { value };
  }catch(e){ return null; }
}

let tasks = [];
let currentTab = 'all';
let currentPriorityFilter = 'all';
let currentSort = 'priority';
let selectedPriority = 'medium';

const listEl = document.getElementById('list');
const taskInput = document.getElementById('taskInput');
const dueInput = document.getElementById('dueInput');
const addBtn = document.getElementById('addBtn');
const priorityPicker = document.getElementById('priorityPicker');
const statusTabs = document.getElementById('statusTabs');
const priorityFilters = document.getElementById('priorityFilters');
const sortSelect = document.getElementById('sortSelect');
const clearBtn = document.getElementById('clearBtn');
const statusText = document.getElementById('statusText');

const PRIORITY_ORDER = { high: 3, medium: 2, low: 1 };

function uid(){
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

function todayStr(){
  const d = new Date();
  d.setHours(0,0,0,0);
  return d;
}

function parseDate(str){
  if(!str) return null;
  const d = new Date(str + 'T00:00:00');
  return isNaN(d.getTime()) ? null : d;
}

function isOverdue(task){
  if(task.completed || !task.dueDate) return false;
  const due = parseDate(task.dueDate);
  if(!due) return false;
  return due < todayStr();
}

function formatDue(str){
  const d = parseDate(str);
  if(!d) return '';
  return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
}

const iconCalendar = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>';
const iconCheck = '<svg viewBox="0 0 24 24" fill="none" stroke="#06251a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';
const iconTrash = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>';
const iconEmpty = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>';

function getFiltered(){
  let out = tasks.slice();

  if(currentTab === 'active') out = out.filter(t => !t.completed);
  if(currentTab === 'completed') out = out.filter(t => t.completed);
  if(currentPriorityFilter !== 'all') out = out.filter(t => t.priority === currentPriorityFilter);

  out.sort((a, b) => {
    if(currentSort === 'priority'){
      const diff = PRIORITY_ORDER[b.priority] - PRIORITY_ORDER[a.priority];
      if(diff !== 0) return diff;
      return b.createdAt - a.createdAt;
    }
    if(currentSort === 'due'){
      if(!a.dueDate && !b.dueDate) return b.createdAt - a.createdAt;
      if(!a.dueDate) return 1;
      if(!b.dueDate) return -1;
      return new Date(a.dueDate) - new Date(b.dueDate);
    }
    // newest
    return b.createdAt - a.createdAt;
  });

  return out;
}

function render(){
  const filtered = getFiltered();
  listEl.innerHTML = '';

  if(filtered.length === 0){
    listEl.innerHTML = `<div class="empty-state">${iconEmpty}<div>No tasks here — add one above, or adjust your filters.</div></div>`;
  } else {
    filtered.forEach(task => {
      const overdue = isOverdue(task);
      const row = document.createElement('div');
      row.className = 'task' + (task.completed ? ' completed' : '') + (overdue ? ' overdue' : '');
      row.dataset.priority = task.priority;
      row.dataset.id = task.id;

      row.innerHTML = `
        <div class="box">${iconCheck}</div>
        <div class="task-body">
          <div class="task-title"></div>
          <div class="task-meta">
            <span class="badge ${task.priority}">${task.priority}</span>
            ${task.dueDate ? `<span class="due-pill ${overdue ? 'overdue' : ''}">${iconCalendar}${formatDue(task.dueDate)}</span>` : ''}
            ${overdue ? `<span class="overdue-tag">Overdue</span>` : ''}
          </div>
        </div>
        <button class="del-btn">${iconTrash}</button>
      `;
      row.querySelector('.task-title').textContent = task.text;
      row.querySelector('.box').addEventListener('click', () => toggleComplete(task.id));
      row.querySelector('.del-btn').addEventListener('click', () => deleteTask(task.id));
      listEl.appendChild(row);
    });
  }

  updateStats();
}

function updateStats(){
  const active = tasks.filter(t => !t.completed).length;
  const done = tasks.filter(t => t.completed).length;
  const overdue = tasks.filter(isOverdue).length;
  const total = tasks.length;

  document.getElementById('statActive').textContent = active;
  document.getElementById('statDone').textContent = done;
  document.getElementById('statOverdue').textContent = overdue;

  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById('railFill').style.width = pct + '%';
}

function addTask(){
  const text = taskInput.value.trim();
  if(!text) return;
  tasks.unshift({
    id: uid(),
    text,
    priority: selectedPriority,
    dueDate: dueInput.value || null,
    completed: false,
    createdAt: Date.now()
  });
  taskInput.value = '';
  dueInput.value = '';
  render();
  persist();
  taskInput.focus();
}

function toggleComplete(id){
  const t = tasks.find(t => t.id === id);
  if(t) t.completed = !t.completed;
  render();
  persist();
}

function deleteTask(id){
  tasks = tasks.filter(t => t.id !== id);
  render();
  persist();
}

function clearCompleted(){
  tasks = tasks.filter(t => !t.completed);
  render();
  persist();
}

addBtn.addEventListener('click', addTask);
taskInput.addEventListener('keydown', (e) => { if(e.key === 'Enter') addTask(); });

priorityPicker.addEventListener('click', (e) => {
  const btn = e.target.closest('.priority-chip');
  if(!btn) return;
  selectedPriority = btn.dataset.p;
  [...priorityPicker.children].forEach(c => c.classList.toggle('active', c === btn));
});

statusTabs.addEventListener('click', (e) => {
  const btn = e.target.closest('.tab');
  if(!btn) return;
  currentTab = btn.dataset.tab;
  [...statusTabs.children].forEach(c => c.classList.toggle('active', c === btn));
  render();
});

priorityFilters.addEventListener('click', (e) => {
  const btn = e.target.closest('.pf-chip');
  if(!btn) return;
  currentPriorityFilter = btn.dataset.pf;
  [...priorityFilters.children].forEach(c => c.classList.toggle('active', c === btn));
  render();
});

sortSelect.addEventListener('change', () => {
  currentSort = sortSelect.value;
  render();
});

clearBtn.addEventListener('click', () => {
  if(tasks.some(t => t.completed) && confirm('Clear all completed tasks?')) clearCompleted();
});

async function persist(){
  try{
    statusText.textContent = 'saving…';
    const res = await storageSet(STORAGE_KEY, JSON.stringify(tasks));
    statusText.textContent = res ? 'saved ✓' : 'save failed';
  }catch(e){
    statusText.textContent = 'save error';
    console.error(e);
  }
}

async function load(){
  try{
    const res = await storageGet(STORAGE_KEY);
    if(res && res.value){
      tasks = JSON.parse(res.value);
    }
    statusText.textContent = 'synced';
  }catch(e){
    statusText.textContent = 'no saved tasks yet';
  }
  render();
}

// re-check overdue status periodically (in case the app stays open across midnight)
setInterval(render, 60000);

load();
</script>
</body>
</html>
