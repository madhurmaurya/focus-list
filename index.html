<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Focus List</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap');

:root {
  --bg: #0a0f0d;
  --panel: #111714;
  --panel-2: #161e1b;
  --panel-border: #1e2b26;
  --mint: #4ade9c;
  --mint-dim: #2d6b52;
  --mint-glow: rgba(74,222,156,0.18);
  --text: #e7f3ee;
  --text-dim: #7d9089;
  --text-faint: #4a5c54;
  --amber: #e8b04b;
  --amber-dim: #6b5322;
  --red: #e0607a;
  --red-dim: #6b2b39;
  --red-glow: rgba(224,96,122,0.2);
  --safe-b: env(safe-area-inset-bottom, 0px);
  --safe-t: env(safe-area-inset-top, 0px);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; margin: 0; }

body {
  background: var(--bg);
  background-image:
    radial-gradient(circle at 15% 0%, rgba(74,222,156,0.06), transparent 50%),
    radial-gradient(circle at 85% 100%, rgba(74,222,156,0.04), transparent 45%);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  overscroll-behavior: none;
}

/* ── App shell ── */
.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
  max-width: 680px;
  margin: 0 auto;
}

/* ── Top header ── */
.top-header {
  flex-shrink: 0;
  position: sticky;
  top: 0;
  z-index: 30;
  padding: calc(14px + var(--safe-t)) 16px 12px;
  background: rgba(10,15,13,0.92);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--panel-border);
}

.header-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
  gap: 8px;
}

.app-brand {
  display: flex;
  align-items: center;
  gap: 9px;
}

.pulse-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--mint);
  box-shadow: 0 0 10px 2px var(--mint-glow);
  animation: pulse 2.6s ease-in-out infinite;
  flex-shrink: 0;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }

.app-brand h1 {
  font-size: 18px;
  font-weight: 800;
  margin: 0;
  letter-spacing: -0.025em;
}

.header-stats {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
}

.hstat {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  padding: 4px 9px;
  border-radius: 8px;
  background: var(--panel);
  border: 1px solid var(--panel-border);
  display: flex;
  align-items: center;
  gap: 4px;
  white-space: nowrap;
}
.hstat .n {
  font-size: 15px;
  font-weight: 700;
  line-height: 1;
}
.hstat.mint .n { color: var(--mint); }
.hstat.amber .n { color: var(--amber); }
.hstat.red { transition: all .2s ease; }
.hstat.red .n { color: var(--red); }
.hstat.red.hidden { display: none; }

.progress-bar-wrap {
  height: 3px;
  background: var(--panel-border);
  border-radius: 4px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--mint-dim), var(--mint));
  border-radius: 4px;
  transition: width .5s cubic-bezier(.4,0,.2,1);
}

/* ── Filter strip ── */
.filter-strip {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 9px 16px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  border-bottom: 1px solid rgba(30,43,38,0.6);
}
.filter-strip::-webkit-scrollbar { display: none; }

.fchip {
  flex-shrink: 0;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11.5px;
  font-weight: 600;
  padding: 6px 13px;
  border-radius: 20px;
  border: 1px solid var(--panel-border);
  background: rgba(255,255,255,0.02);
  color: var(--text-faint);
  cursor: pointer;
  transition: all .15s ease;
  white-space: nowrap;
  min-height: 34px;
  display: flex;
  align-items: center;
  outline: none;
}
.fchip:active { opacity: .7; }

/* Tab chips */
.fchip[data-tab].active {
  color: var(--mint);
  border-color: var(--mint-dim);
  background: rgba(74,222,156,0.1);
}

/* Priority filter chips */
.fchip[data-pf="all"].active {
  color: var(--text-dim);
  border-color: var(--text-faint);
  background: rgba(255,255,255,0.06);
}
.fchip[data-pf="low"].active {
  color: var(--mint);
  border-color: var(--mint-dim);
  background: rgba(74,222,156,0.1);
}
.fchip[data-pf="medium"].active {
  color: var(--amber);
  border-color: var(--amber-dim);
  background: rgba(232,176,75,0.1);
}
.fchip[data-pf="high"].active {
  color: var(--red);
  border-color: var(--red-dim);
  background: rgba(224,96,122,0.1);
}

.strip-sep {
  flex-shrink: 0;
  width: 1px;
  height: 20px;
  background: var(--panel-border);
}

.sort-sel {
  flex-shrink: 0;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11.5px;
  padding: 6px 12px;
  border-radius: 20px;
  border: 1px solid var(--panel-border);
  background: var(--panel);
  color: var(--text-dim);
  cursor: pointer;
  min-height: 34px;
  outline: none;
  appearance: none;
  -webkit-appearance: none;
}

/* ── Main scroll area ── */
.list-area {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 12px 12px calc(88px + var(--safe-b));
}

.list {
  display: flex;
  flex-direction: column;
  gap: 9px;
}

/* ── Task card ── */
.task {
  background: var(--panel);
  border: 1px solid var(--panel-border);
  border-radius: 16px;
  display: flex;
  align-items: stretch;
  overflow: hidden;
  position: relative;
  transition: opacity .25s ease;
}

.task-bar {
  width: 4px;
  flex-shrink: 0;
  background: var(--text-faint);
  opacity: .35;
}
.task[data-priority="low"] .task-bar { background: var(--mint-dim); opacity: 1; }
.task[data-priority="medium"] .task-bar { background: var(--amber-dim); opacity: 1; }
.task[data-priority="high"] .task-bar { background: var(--red); opacity: 1; }
.task.overdue .task-bar { background: var(--red); box-shadow: 0 0 8px rgba(224,96,122,0.5); }

/* Checkbox hit area */
.task-check {
  flex-shrink: 0;
  width: 52px;
  min-height: 58px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.chkbox {
  width: 22px; height: 22px;
  border-radius: 7px;
  border: 1.5px solid var(--text-faint);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .15s ease;
  flex-shrink: 0;
}
.task.completed .chkbox { background: var(--mint); border-color: var(--mint); }
.chkbox svg { width: 13px; height: 13px; opacity: 0; transform: scale(.5); transition: all .15s ease; }
.task.completed .chkbox svg { opacity: 1; transform: scale(1); }

.task-body {
  flex: 1;
  padding: 12px 6px 12px 0;
  min-width: 0;
}

.task-title {
  font-size: 14.5px;
  font-weight: 500;
  line-height: 1.45;
  word-break: break-word;
}
.task.completed .task-title { text-decoration: line-through; color: var(--text-faint); }

.task-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 6px;
}

.badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .04em;
  text-transform: uppercase;
  padding: 2px 8px;
  border-radius: 20px;
  border: 1px solid transparent;
}
.badge.low { color: var(--mint); background: rgba(74,222,156,0.1); border-color: var(--mint-dim); }
.badge.medium { color: var(--amber); background: rgba(232,176,75,0.1); border-color: var(--amber-dim); }
.badge.high { color: var(--red); background: rgba(224,96,122,0.1); border-color: var(--red-dim); }

.due-pill {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: 4px;
}
.due-pill svg { width: 11px; height: 11px; opacity: .7; }
.due-pill.overdue { color: var(--red); font-weight: 600; }
.due-pill.overdue svg { opacity: 1; }

.overdue-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; font-weight: 700; letter-spacing: .06em;
  color: var(--red);
  background: rgba(224,96,122,0.12);
  border: 1px solid var(--red-dim);
  padding: 2px 8px; border-radius: 20px;
  animation: ov-blink 2.2s ease-in-out infinite;
}
@keyframes ov-blink { 0%,100%{opacity:1} 50%{opacity:.6} }

/* Edit button on card */
.edit-btn {
  flex-shrink: 0;
  width: 44px;
  align-self: stretch;
  display: flex;
  align-items: center;
  justify-content: center;
  border: none;
  border-left: 1px solid var(--panel-border);
  background: none;
  color: var(--text-faint);
  cursor: pointer;
  transition: all .15s ease;
  border-radius: 0 16px 16px 0;
  padding: 0;
}
.edit-btn svg { width: 14px; height: 14px; }
.edit-btn:active, .edit-btn:hover {
  color: var(--mint);
  background: rgba(74,222,156,0.07);
}

/* Delete button — lives in the edit sheet, not on the card */
.sheet-delete-btn {
  display: none;
  width: 100%;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 600;
  padding: 14px;
  border-radius: 14px;
  border: 1.5px solid var(--red-dim);
  background: rgba(224,96,122,0.05);
  color: var(--red);
  cursor: pointer;
  transition: all .15s ease;
  min-height: 48px;
  margin-top: 10px;
  letter-spacing: .02em;
}
.sheet-delete-btn.visible { display: flex; }
.sheet-delete-btn svg { width: 15px; height: 15px; }
.sheet-delete-btn:active, .sheet-delete-btn:hover {
  background: rgba(224,96,122,0.12);
  border-color: var(--red);
}

.task.completed { opacity: .45; }
.task.overdue {
  background: linear-gradient(90deg, rgba(224,96,122,0.04) 0%, transparent 60%);
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 64px 20px;
  color: var(--text-faint);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12.5px;
  line-height: 1.7;
}
.empty-state svg { width: 38px; height: 38px; margin: 0 auto 14px; display: block; opacity: .3; }

/* Footer (inside scroll area) */
.footer-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 4px 0;
  border-top: 1px solid var(--panel-border);
  margin-top: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-faint);
}

.clear-btn {
  background: none;
  border: 1px solid var(--panel-border);
  color: var(--text-dim);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  padding: 7px 14px;
  border-radius: 20px;
  cursor: pointer;
  transition: all .2s ease;
  min-height: 36px;
}
.clear-btn:hover, .clear-btn:active { border-color: var(--red-dim); color: var(--red); }

/* ── FAB ── */
.fab {
  position: fixed;
  bottom: calc(24px + var(--safe-b));
  right: 20px;
  width: 58px; height: 58px;
  border-radius: 50%;
  background: var(--mint);
  border: none;
  color: #06251a;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 22px rgba(74,222,156,0.45), 0 2px 8px rgba(0,0,0,0.45);
  transition: transform .2s cubic-bezier(.34,1.56,.64,1), background .15s ease, box-shadow .2s ease;
  z-index: 40;
  outline: none;
}
.fab:hover { background: #5ee8ad; box-shadow: 0 6px 28px rgba(74,222,156,0.55), 0 2px 8px rgba(0,0,0,0.45); }
.fab:active { transform: scale(.94); }
.fab svg { width: 26px; height: 26px; transition: transform .25s cubic-bezier(.34,1.56,.64,1); }
.fab.is-open { background: var(--panel-2); box-shadow: 0 4px 16px rgba(0,0,0,0.4); }
.fab.is-open svg { transform: rotate(45deg); color: var(--text-dim); }

/* ── Sheet backdrop ── */
.backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(3px);
  -webkit-backdrop-filter: blur(3px);
  z-index: 50;
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s ease;
}
.backdrop.visible { opacity: 1; pointer-events: all; }

/* ── Bottom sheet ── */
.bottom-sheet {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  max-width: 680px;
  max-height: 92dvh;
  max-height: 92vh;
  margin: 0 auto;
  background: var(--panel);
  border: 1px solid var(--panel-border);
  border-bottom: none;
  border-radius: 24px 24px 0 0;
  z-index: 55;
  transform: translateY(calc(100% + 4px));
  transition: transform .32s cubic-bezier(.4,0,.2,1);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.bottom-sheet::before {
  content: "";
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent 5%, var(--mint) 50%, transparent 95%);
  opacity: .8;
  z-index: 1;
}
.bottom-sheet.is-open { transform: translateY(0); }

.sheet-scroll {
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 0 18px calc(20px + var(--safe-b));
  flex: 1;
}

.sheet-handle {
  width: 38px; height: 4px;
  background: var(--panel-border);
  border-radius: 2px;
  margin: 13px auto 0;
  flex-shrink: 0;
}

.sheet-eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: .16em;
  text-transform: uppercase;
  color: var(--mint);
  margin-bottom: 14px;
  margin-top: 18px;
  opacity: .85;
}

.add-input {
  width: 100%;
  font-family: 'Inter', sans-serif;
  font-size: 16px;
  padding: 14px 16px;
  border-radius: 14px;
  border: 1.5px solid var(--panel-border);
  background: rgba(255,255,255,0.03);
  color: var(--text);
  outline: none;
  margin-bottom: 16px;
  transition: border-color .15s ease;
  -webkit-appearance: none;
  appearance: none;
}
.add-input::placeholder { color: var(--text-faint); }
.add-input:focus { border-color: var(--mint-dim); }

.field-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--text-faint);
  margin-bottom: 9px;
}

.priority-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 9px;
  margin-bottom: 16px;
}

.p-chip {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 600;
  padding: 12px 8px;
  border-radius: 13px;
  border: 1.5px solid var(--panel-border);
  background: rgba(255,255,255,0.02);
  color: var(--text-faint);
  cursor: pointer;
  transition: all .15s ease;
  text-align: center;
  min-height: 46px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  outline: none;
}
.p-chip:active { opacity: .75; }
.p-chip[data-p="low"].active  { color: var(--mint);  border-color: var(--mint-dim);  background: rgba(74,222,156,0.1); }
.p-chip[data-p="medium"].active { color: var(--amber); border-color: var(--amber-dim); background: rgba(232,176,75,0.1); }
.p-chip[data-p="high"].active   { color: var(--red);   border-color: var(--red-dim);   background: rgba(224,96,122,0.1); }

.p-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}
.p-chip[data-p="low"]    .p-dot { background: var(--mint-dim); }
.p-chip[data-p="medium"] .p-dot { background: var(--amber-dim); }
.p-chip[data-p="high"]   .p-dot { background: var(--red-dim); }
.p-chip[data-p="low"].active    .p-dot { background: var(--mint); }
.p-chip[data-p="medium"].active .p-dot { background: var(--amber); }
.p-chip[data-p="high"].active   .p-dot { background: var(--red); }

.date-field {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 18px;
  padding: 12px 14px;
  border-radius: 14px;
  border: 1.5px solid var(--panel-border);
  background: rgba(255,255,255,0.02);
}

.date-field-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11.5px;
  color: var(--text-faint);
  flex: 1;
  display: flex;
  align-items: center;
  gap: 7px;
}
.date-field-label svg { width: 14px; height: 14px; opacity: .6; }

.date-input {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12.5px;
  padding: 4px 8px;
  border-radius: 8px;
  border: 1px solid var(--panel-border);
  background: var(--panel);
  color: var(--text);
  outline: none;
  color-scheme: dark;
  min-height: 36px;
}
.date-input:focus { border-color: var(--mint-dim); }

.add-btn {
  width: 100%;
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  font-weight: 700;
  padding: 16px;
  border-radius: 16px;
  border: none;
  background: var(--mint);
  color: #05201a;
  cursor: pointer;
  transition: all .15s ease;
  min-height: 54px;
  letter-spacing: .03em;
  -webkit-appearance: none;
  appearance: none;
}
.add-btn:hover { background: #5ee8ad; }
.add-btn:active { transform: scale(.98); opacity: .9; }

/* ── Desktop overrides ── */
@media (min-width: 640px) {
  .top-header { padding: 20px 24px 14px; }
  .app-brand h1 { font-size: 22px; }
  .filter-strip { padding: 11px 24px; }
  .list-area { padding: 16px 24px calc(96px + var(--safe-b)); }
  .bottom-sheet { border-radius: 22px 22px 0 0; }
  .sheet-scroll { padding: 0 26px calc(26px + var(--safe-b)); }
  .fab { bottom: calc(30px + var(--safe-b)); right: 28px; width: 62px; height: 62px; }
  .edit-btn { opacity: 0; }
  .task:hover .edit-btn { opacity: 1; }
}

/* ── Task entry animation ── */
@keyframes task-in {
  from { opacity: 0; transform: translateY(-6px) scale(.98); }
  to   { opacity: 1; transform: translateY(0)   scale(1); }
}
.task.new { animation: task-in .22s ease forwards; }
</style>
</head>
<body>

<div class="app">

  <!-- ── Top header ── -->
  <header class="top-header">
    <div class="header-row">
      <div class="app-brand">
        <div class="pulse-dot"></div>
        <h1>Focus List</h1>
      </div>
      <div class="header-stats">
        <div class="hstat mint"><span class="n" id="statActive">0</span>&nbsp;active</div>
        <div class="hstat amber"><span class="n" id="statDone">0</span>&nbsp;done</div>
        <div class="hstat red hidden" id="overdueHstat"><span class="n" id="statOverdue">0</span>&nbsp;late</div>
      </div>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="railFill" style="width:0%"></div>
    </div>
  </header>

  <!-- ── Filter strip ── -->
  <div class="filter-strip" id="filterStrip">
    <button class="fchip active" data-tab="all">All</button>
    <button class="fchip" data-tab="active">Active</button>
    <button class="fchip" data-tab="completed">Done</button>
    <div class="strip-sep"></div>
    <button class="fchip active" data-pf="all">All</button>
    <button class="fchip" data-pf="high">High</button>
    <button class="fchip" data-pf="medium">Medium</button>
    <button class="fchip" data-pf="low">Low</button>
    <div class="strip-sep"></div>
    <select class="sort-sel" id="sortSelect">
      <option value="priority">↕ Priority</option>
      <option value="due">↕ Due date</option>
      <option value="created">↕ Newest</option>
    </select>
  </div>

  <!-- ── Task list ── -->
  <main class="list-area">
    <div class="list" id="list"></div>
    <div class="footer-inner">
      <span id="statusText">syncing…</span>
      <button class="clear-btn" id="clearBtn">Clear completed</button>
    </div>
  </main>

</div>

<!-- FAB -->
<button class="fab" id="fab" aria-label="Add task">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
  </svg>
</button>

<!-- Backdrop -->
<div class="backdrop" id="backdrop"></div>

<!-- Bottom sheet -->
<div class="bottom-sheet" id="bottomSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-scroll">
  <div class="sheet-eyebrow" id="sheetEyebrow">New Task</div>

  <input
    type="text"
    class="add-input"
    id="taskInput"
    placeholder="What needs to get done?"
    maxlength="200"
    autocomplete="off"
    autocorrect="on"
    spellcheck="true"
  >

  <div class="field-label">Priority</div>
  <div class="priority-grid" id="priorityPicker">
    <button class="p-chip" data-p="low"><span class="p-dot"></span>Low</button>
    <button class="p-chip active" data-p="medium"><span class="p-dot"></span>Medium</button>
    <button class="p-chip" data-p="high"><span class="p-dot"></span>High</button>
  </div>

  <div class="date-field">
    <label class="date-field-label" for="dueInput">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>
      </svg>
      Due date
    </label>
    <input type="date" class="date-input" id="dueInput">
  </div>

  <button class="add-btn" id="addBtn">Add Task</button>
  <button class="sheet-delete-btn" id="sheetDeleteBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
    Delete Task
  </button>
  </div>
</div>

<script>
const STORAGE_KEY = 'neuro-tasks-state';
const hasClaudeStorage = typeof window.storage !== 'undefined' && window.storage && typeof window.storage.get === 'function';

async function storageGet(key) {
  if (hasClaudeStorage) { try { return await window.storage.get(key, false); } catch(e) { return null; } }
  try { const r = localStorage.getItem(key); return r ? { value: r } : null; } catch(e) { return null; }
}
async function storageSet(key, value) {
  if (hasClaudeStorage) { try { return await window.storage.set(key, value, false); } catch(e) { return null; } }
  try { localStorage.setItem(key, value); return { value }; } catch(e) { return null; }
}

/* ── State ── */
let tasks = [];
let currentTab = 'all';
let currentPF = 'all';
let currentSort = 'priority';
let selectedPriority = 'medium';
let sheetOpen = false;
let editingId = null;

/* ── DOM ── */
const listEl       = document.getElementById('list');
const taskInput    = document.getElementById('taskInput');
const dueInput     = document.getElementById('dueInput');
const addBtn       = document.getElementById('addBtn');
const priorityGrid = document.getElementById('priorityPicker');
const filterStrip  = document.getElementById('filterStrip');
const sortSel      = document.getElementById('sortSelect');
const clearBtn     = document.getElementById('clearBtn');
const statusText   = document.getElementById('statusText');
const fab          = document.getElementById('fab');
const backdrop     = document.getElementById('backdrop');
const sheet        = document.getElementById('bottomSheet');
const overdueHstat = document.getElementById('overdueHstat');
const sheetEyebrow = document.getElementById('sheetEyebrow');
const sheetDeleteBtn = document.getElementById('sheetDeleteBtn');

const PRIO_ORDER = { high: 3, medium: 2, low: 1 };

/* ── Helpers ── */
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }

function today() { const d = new Date(); d.setHours(0,0,0,0); return d; }

function parseDate(str) {
  if (!str) return null;
  const d = new Date(str + 'T00:00:00');
  return isNaN(d.getTime()) ? null : d;
}

function isOverdue(t) {
  if (t.completed || !t.dueDate) return false;
  const due = parseDate(t.dueDate);
  return due ? due < today() : false;
}

function fmtDue(str) {
  const d = parseDate(str);
  if (!d) return '';
  return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
}

/* ── SVGs ── */
const SVG_CHECK  = '<svg viewBox="0 0 24 24" fill="none" stroke="#06251a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';
const SVG_TRASH  = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>';
const SVG_PENCIL = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
const SVG_CAL    = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>';
const SVG_EMPTY  = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>';

/* ── Filter/sort ── */
function getFiltered() {
  let out = tasks.slice();
  if (currentTab === 'active')    out = out.filter(t => !t.completed);
  if (currentTab === 'completed') out = out.filter(t =>  t.completed);
  if (currentPF !== 'all')        out = out.filter(t => t.priority === currentPF);

  out.sort((a, b) => {
    if (currentSort === 'priority') {
      const d = PRIO_ORDER[b.priority] - PRIO_ORDER[a.priority];
      return d !== 0 ? d : b.createdAt - a.createdAt;
    }
    if (currentSort === 'due') {
      if (!a.dueDate && !b.dueDate) return b.createdAt - a.createdAt;
      if (!a.dueDate) return 1;
      if (!b.dueDate) return -1;
      return new Date(a.dueDate) - new Date(b.dueDate);
    }
    return b.createdAt - a.createdAt;
  });
  return out;
}

/* ── Render ── */
function render() {
  const filtered = getFiltered();
  listEl.innerHTML = '';

  if (filtered.length === 0) {
    listEl.innerHTML = `<div class="empty-state">${SVG_EMPTY}<div>No tasks here.<br>Tap <strong>+</strong> to add one.</div></div>`;
  } else {
    filtered.forEach(task => {
      const overdue = isOverdue(task);
      const el = document.createElement('div');
      el.className = 'task' + (task.completed ? ' completed' : '') + (overdue ? ' overdue' : '');
      el.dataset.priority = task.priority;
      el.dataset.id = task.id;

      el.innerHTML = `
        <div class="task-bar"></div>
        <div class="task-check"><div class="chkbox">${SVG_CHECK}</div></div>
        <div class="task-body">
          <div class="task-title"></div>
          <div class="task-meta">
            <span class="badge ${task.priority}">${task.priority}</span>
            ${task.dueDate ? `<span class="due-pill${overdue ? ' overdue' : ''}">${SVG_CAL}${fmtDue(task.dueDate)}</span>` : ''}
            ${overdue ? `<span class="overdue-tag">Overdue</span>` : ''}
          </div>
        </div>
        <button class="edit-btn" aria-label="Edit task">${SVG_PENCIL}</button>
      `;
      el.querySelector('.task-title').textContent = task.text;
      el.querySelector('.task-check').addEventListener('click', () => toggleComplete(task.id));
      el.querySelector('.edit-btn').addEventListener('click', () => openEditSheet(task.id));
      listEl.appendChild(el);
    });
  }

  updateStats();
}

function updateStats() {
  const active  = tasks.filter(t => !t.completed).length;
  const done    = tasks.filter(t =>  t.completed).length;
  const overdue = tasks.filter(isOverdue).length;
  const total   = tasks.length;

  document.getElementById('statActive').textContent  = active;
  document.getElementById('statDone').textContent    = done;
  document.getElementById('statOverdue').textContent = overdue;
  overdueHstat.classList.toggle('hidden', overdue === 0);

  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById('railFill').style.width = pct + '%';
}

/* ── Actions ── */
function submitTask() {
  const text = taskInput.value.trim();
  if (!text) { taskInput.focus(); return; }

  if (editingId) {
    const t = tasks.find(t => t.id === editingId);
    if (t) {
      t.text     = text;
      t.priority = selectedPriority;
      t.dueDate  = dueInput.value || null;
    }
  } else {
    tasks.unshift({
      id: uid(),
      text,
      priority: selectedPriority,
      dueDate: dueInput.value || null,
      completed: false,
      createdAt: Date.now()
    });
  }

  const wasEditing = !!editingId;
  const savedId    = editingId;
  closeSheet();
  render();
  persist();

  if (!wasEditing) {
    const first = listEl.firstElementChild;
    if (first && first.classList.contains('task')) {
      first.classList.add('new');
      setTimeout(() => first.classList.remove('new'), 300);
    }
  } else {
    const updated = listEl.querySelector(`[data-id="${savedId}"]`);
    if (updated) {
      updated.classList.add('new');
      setTimeout(() => updated.classList.remove('new'), 300);
    }
  }
}

function toggleComplete(id) {
  const t = tasks.find(t => t.id === id);
  if (t) t.completed = !t.completed;
  render();
  persist();
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  render();
  persist();
}

function clearCompleted() {
  tasks = tasks.filter(t => !t.completed);
  render();
  persist();
}

/* ── Sheet ── */
function openSheet() {
  editingId = null;
  sheetEyebrow.textContent = 'New Task';
  addBtn.textContent = 'Add Task';
  taskInput.value = '';
  dueInput.value  = '';
  setActivePriority('medium');
  sheetDeleteBtn.classList.remove('visible');
  sheetOpen = true;
  sheet.classList.add('is-open');
  backdrop.classList.add('visible');
  fab.classList.add('is-open');
  setTimeout(() => taskInput.focus(), 80);
}

function openEditSheet(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  editingId = id;
  sheetEyebrow.textContent = 'Edit Task';
  addBtn.textContent = 'Save Changes';
  taskInput.value = t.text;
  dueInput.value  = t.dueDate || '';
  setActivePriority(t.priority);
  sheetDeleteBtn.classList.add('visible');
  sheetOpen = true;
  sheet.classList.add('is-open');
  backdrop.classList.add('visible');
  fab.classList.add('is-open');
  setTimeout(() => { taskInput.focus(); taskInput.select(); }, 80);
}

function setActivePriority(p) {
  selectedPriority = p;
  [...priorityGrid.children].forEach(c => c.classList.toggle('active', c.dataset.p === p));
}

function closeSheet() {
  sheetOpen = false;
  editingId = null;
  sheet.classList.remove('is-open');
  backdrop.classList.remove('visible');
  fab.classList.remove('is-open');
  taskInput.value = '';
  dueInput.value  = '';
  sheetEyebrow.textContent = 'New Task';
  addBtn.textContent = 'Add Task';
  sheetDeleteBtn.classList.remove('visible');
  setActivePriority('medium');
}

fab.addEventListener('click', () => sheetOpen ? closeSheet() : openSheet());
backdrop.addEventListener('click', closeSheet);
document.addEventListener('keydown', e => { if (e.key === 'Escape' && sheetOpen) closeSheet(); });

sheetDeleteBtn.addEventListener('click', () => {
  const id = editingId;
  closeSheet();
  deleteTask(id);
});

/* ── Add/save task listeners ── */
addBtn.addEventListener('click', submitTask);
taskInput.addEventListener('keydown', e => { if (e.key === 'Enter') submitTask(); });

/* ── Priority picker ── */
priorityGrid.addEventListener('click', e => {
  const btn = e.target.closest('.p-chip');
  if (!btn) return;
  setActivePriority(btn.dataset.p);
});

/* ── Filter strip (tabs + priority filters) ── */
filterStrip.addEventListener('click', e => {
  const chip = e.target.closest('.fchip');
  if (!chip) return;

  if (chip.dataset.tab !== undefined) {
    currentTab = chip.dataset.tab;
    filterStrip.querySelectorAll('[data-tab]').forEach(c => c.classList.toggle('active', c === chip));
    render();
  }

  if (chip.dataset.pf !== undefined) {
    currentPF = chip.dataset.pf;
    filterStrip.querySelectorAll('[data-pf]').forEach(c => c.classList.toggle('active', c === chip));
    render();
  }
});

/* ── Sort ── */
sortSel.addEventListener('change', () => { currentSort = sortSel.value; render(); });

/* ── Clear completed ── */
clearBtn.addEventListener('click', () => {
  if (tasks.some(t => t.completed) && confirm('Clear all completed tasks?')) clearCompleted();
});

/* ── Persist ── */
async function persist() {
  try {
    statusText.textContent = 'saving…';
    const res = await storageSet(STORAGE_KEY, JSON.stringify(tasks));
    statusText.textContent = res ? 'saved ✓' : 'save failed';
  } catch(e) {
    statusText.textContent = 'save error';
  }
}

async function load() {
  try {
    const res = await storageGet(STORAGE_KEY);
    if (res && res.value) tasks = JSON.parse(res.value);
    statusText.textContent = 'synced';
  } catch(e) {
    statusText.textContent = 'no saved tasks yet';
  }
  render();
}

setInterval(render, 60000);
load();
</script>
</body>
</html>
